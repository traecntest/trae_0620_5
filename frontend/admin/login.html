<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老年食堂管理后台 - 登录</title>
    <link rel="stylesheet" href="/static/css/admin.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1E3A8A 0%, #1E40AF 50%, #3B82F6 100%);
            padding: 20px;
        }
        .login-box {
            background: white;
            padding: 48px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1E3A8A;
            margin-bottom: 8px;
        }
        .login-header p {
            color: #6B7280;
            font-size: 14px;
        }
        .login-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1E3A8A, #3B82F6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
        }
        .login-form .form-group {
            margin-bottom: 24px;
        }
        .login-form .form-group label {
            font-weight: 500;
            color: #374151;
        }
        .login-form .form-group input {
            padding: 14px 16px;
            font-size: 15px;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 8px;
        }
        .login-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #E5E7EB;
            color: #9CA3AF;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="login-icon">🍽️</div>
                <h1>老年食堂管理后台</h1>
                <p>请输入您的账号密码登录系统</p>
            </div>
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary login-btn">登 录</button>
            </form>
            <div class="login-footer">
                社区老年食堂点餐系统 © 2026
            </div>
        </div>
    </div>
    <script src="/static/js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const phone = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const data = await adminApiRequest('/auth/admin-login', 'POST', { phone, password }, false);
                localStorage.setItem('admin_token', data.access_token);
                localStorage.setItem('admin_info', JSON.stringify(data.user));
                showToast('登录成功');
                setTimeout(() => {
                    window.location.href = '/admin/dashboard';
                }, 1000);
            } catch (error) {
                showToast(error.message || '登录失败');
            }
        });
    </script>
</body>
</html>
