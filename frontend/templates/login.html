<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老年食堂 - 登录</title>
    <link rel="stylesheet" href="/static/css/elderly.css">
</head>
<body>
    <main class="container">
        <header style="text-align: center; padding: 40px 0;">
            <div style="font-size: 80px; margin-bottom: 16px;">🍚</div>
            <h1>社区老年食堂</h1>
            <p style="font-size: 28px; color: var(--text-secondary);">欢迎使用点餐服务</p>
        </header>

        <form id="loginForm" style="margin-top: 40px;">
            <div class="input-group">
                <label for="phone">手机号码</label>
                <input 
                    type="tel" 
                    id="phone" 
                    name="phone" 
                    placeholder="请输入11位手机号码" 
                    maxlength="11"
                    inputmode="numeric"
                    required
                >
            </div>

            <div class="input-group">
                <label for="code">短信验证码</label>
                <div style="display: flex; gap: 12px;">
                    <input 
                        type="text" 
                        id="code" 
                        name="code" 
                        placeholder="请输入验证码" 
                        maxlength="6"
                        inputmode="numeric"
                        required
                        style="flex: 1;"
                    >
                    <button 
                        type="button" 
                        id="getCodeBtn" 
                        class="btn btn-secondary"
                        style="min-width: 180px;"
                    >
                        获取验证码
                    </button>
                </div>
            </div>

            <div style="background: var(--bg-gray); padding: 20px; border-radius: 16px; margin-bottom: 24px;">
                <p style="color: var(--accent-color); font-size: 24px; margin: 0; text-align: center;">
                    测试验证码：123456
                </p>
            </div>

            <button type="submit" id="loginBtn" class="btn btn-primary btn-lg btn-block">
                登 录
            </button>
        </form>
    </main>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/voice.js"></script>
    <script>
        let countdown = 0;
        let countdownTimer = null;

        document.getElementById('getCodeBtn').addEventListener('click', async function() {
            const phone = document.getElementById('phone').value.trim();
            
            if (!phone) {
                showToast('请输入手机号码');
                return;
            }
            
            if (!/^1\d{10}$/.test(phone)) {
                showToast('请输入正确的11位手机号码');
                return;
            }

            if (countdown > 0) return;

            try {
                await apiRequest('/auth/send-code', 'POST', { phone }, false);
                showToast('验证码已发送');
                
                countdown = 60;
                this.disabled = true;
                this.textContent = `${countdown}秒后重试`;
                
                countdownTimer = setInterval(() => {
                    countdown--;
                    if (countdown <= 0) {
                        clearInterval(countdownTimer);
                        this.disabled = false;
                        this.textContent = '获取验证码';
                    } else {
                        this.textContent = `${countdown}秒后重试`;
                    }
                }, 1000);
            } catch (error) {
                showToast(error.message);
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value.trim();
            const code = document.getElementById('code').value.trim();
            
            if (!phone) {
                showToast('请输入手机号码');
                return;
            }
            
            if (!code) {
                showToast('请输入验证码');
                return;
            }

            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading"></span> 登录中...';

            try {
                const data = await apiRequest('/auth/login', 'POST', { phone, code }, false);
                
                if (data.access_token) {
                    setAuthToken(data.access_token);
                    if (data.user) {
                        setUserInfo(data.user);
                    }
                    
                    showToast('登录成功');
                    speak('登录成功，欢迎使用老年食堂');
                    
                    setTimeout(() => {
                        navigateTo('/');
                    }, 1000);
                }
            } catch (error) {
                showToast(error.message);
                loginBtn.disabled = false;
                loginBtn.textContent = '登 录';
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            if (getAuthToken()) {
                navigateTo('/');
            }
        });
    </script>
</body>
</html>
