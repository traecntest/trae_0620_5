<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老年食堂 - 首页</title>
    <link rel="stylesheet" href="/static/css/elderly.css">
</head>
<body>
    <main class="container">
        <header style="margin-bottom: 32px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h1 id="welcomeText">您好！</h1>
                <button id="logoutBtn" class="btn btn-outline" style="min-height: 48px; font-size: 22px; padding: 8px 20px;">
                    退出
                </button>
            </div>
            <p id="todayDate" style="font-size: 28px; color: var(--text-secondary);"></p>
        </header>

        <section style="margin-top: 40px;">
            <button id="orderBtn" class="btn btn-primary btn-lg btn-block" style="margin-bottom: 24px;">
                <span style="font-size: 48px; margin-right: 16px;">🍽️</span>
                我要点餐
            </button>

            <button id="myOrdersBtn" class="btn btn-secondary btn-lg btn-block" style="margin-bottom: 24px;">
                <span style="font-size: 48px; margin-right: 16px;">📋</span>
                我的订单
            </button>

            <button id="familyBtn" class="btn btn-outline btn-lg btn-block">
                <span style="font-size: 48px; margin-right: 16px;">👨‍👩‍👧</span>
                亲属代订
            </button>
        </section>

        <section style="margin-top: 48px;">
            <div class="card">
                <h3 style="color: var(--primary-color); margin-bottom: 12px;">温馨提示</h3>
                <p style="margin-bottom: 8px;">• 请提前30分钟下单</p>
                <p style="margin-bottom: 8px;">• 凭取餐码到食堂取餐</p>
                <p>• 有问题请呼叫语音助手</p>
            </div>
        </section>
    </main>

    <button id="voiceBtn" class="voice-btn">🎤</button>

    <nav class="bottom-nav">
        <a href="/" class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">首页</span>
        </a>
        <a href="/order" class="nav-item">
            <span class="nav-icon">🍽️</span>
            <span class="nav-label">点餐</span>
        </a>
        <a href="/orders" class="nav-item">
            <span class="nav-icon">📋</span>
            <span class="nav-label">订单</span>
        </a>
        <a href="/family" class="nav-item">
            <span class="nav-icon">👨‍👩‍👧</span>
            <span class="nav-label">亲属</span>
        </a>
    </nav>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/voice.js"></script>
    <script>
        function getTodayDate() {
            const now = new Date();
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const weekday = weekdays[now.getDay()];
            return `${year}年${month}月${day}日 ${weekday}`;
        }

        function loadUserInfo() {
            const userInfo = getUserInfo();
            if (userInfo && userInfo.name) {
                document.getElementById('welcomeText').textContent = `${userInfo.name}，您好！`;
            }
        }

        document.getElementById('orderBtn').addEventListener('click', function() {
            navigateTo('/order');
        });

        document.getElementById('myOrdersBtn').addEventListener('click', function() {
            navigateTo('/orders');
        });

        document.getElementById('familyBtn').addEventListener('click', function() {
            navigateTo('/family');
        });

        document.getElementById('logoutBtn').addEventListener('click', function() {
            if (confirm('确定要退出登录吗？')) {
                logout();
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            if (!checkAuth()) return;
            
            document.getElementById('todayDate').textContent = getTodayDate();
            loadUserInfo();
            initVoiceButton();
        });
    </script>
</body>
</html>
